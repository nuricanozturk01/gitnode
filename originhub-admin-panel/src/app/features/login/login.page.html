<div class="bg-base-200 flex min-h-screen items-center justify-center p-4">
  <div class="card bg-base-100 w-full max-w-md shadow-lg">
    <div class="card-body gap-6">
      <div class="text-center">
        <span class="originhub-mark mb-2 inline-flex text-3xl sm:text-4xl">
          <span class="originhub-mark__origin">Origin</span><span class="originhub-mark__hub">Hub</span>
        </span>
        <p class="badge-pill badge-pill--primary mb-4">Admin</p>
        <h1 class="text-base-content text-2xl font-bold">Platform sign in</h1>
        <p class="text-base-content/60 mt-1 text-sm">Platform administration for users, stats, and SSO</p>
      </div>

      @if (error()) {
      <div class="alert alert-error" role="alert">
        <lucide-icon name="circleAlert" class="size-4 shrink-0"></lucide-icon>
        <span>{{ error() }}</span>
      </div>
      }

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
        <div class="form-control">
          <label class="label" for="usernameOrEmail">
            <span class="label-text font-medium">Username or Email</span>
          </label>
          <input
            id="usernameOrEmail"
            type="text"
            formControlName="usernameOrEmail"
            placeholder="username or email"
            class="input input-bordered w-full"
            autocomplete="username"
          />
        </div>

        <div class="form-control">
          <label class="label" for="password">
            <span class="label-text font-medium">Password</span>
          </label>
          <input
            id="password"
            type="password"
            formControlName="password"
            placeholder="••••••••"
            class="input input-bordered w-full"
            autocomplete="current-password"
          />
        </div>

        <button type="submit" class="btn btn-primary mt-2 w-full" [disabled]="form.invalid || loading()">
          @if (loading()) {
          <span class="loading loading-spinner loading-sm"></span>
          } @else { Sign in }
        </button>
      </form>
    </div>
  </div>
</div>
