# Local profile (kind) — pair with: make k8s-bootstrap LOCAL=1
#
# SPA is served by the backend (SPRING_PROFILES_ACTIVE=os) at domain.apiHost.
# Bootstrap builds originhub-os:local + originhub-admin-panel:local with correct API URL.
imageTag: local

domain:
  apiHost: api.originhub.local
  # Same host as API — embedded SPA in originhub-os image (no separate frontend deploy)
  frontendUrl: http://api.originhub.local
  grafanaHost: grafana.originhub.local
  extraCorsOrigins:
    - http://admin.originhub.local
    - http://localhost:4200

frontend:
  enabled: false

adminPanel:
  enabled: true
  host: admin.originhub.local
  image:
    repository: originhub-admin-panel
    tag: local
    pullPolicy: IfNotPresent

monitoring:
  prometheus:
    ingress:
      enabled: false
      host: prometheus.originhub.local

persistence:
  repos:
    size: 5Gi
  postgres:
    size: 5Gi

common:
  secrets:
    # Base64(JWT signing key) — JwtUtils decodes ORIGINHUB_JWT_SECRET again at runtime
    ORIGINHUB_JWT_SECRET: Ykc5allXd3RaR1YyTFdwM2RDMXpaV055WlhRdGEyVjVMVE15WW5sMFpYTWhJUT09

originhub:
  image:
    repository: originhub-os
    pullPolicy: IfNotPresent
  ssh:
    serviceType: NodePort
    nodePort: 30222
  secrets:
    # Admin123 — platform admin for http://admin.originhub.local (username: admin)
    ORIGINHUB_BOOTSTRAP_ADMIN_PASSWORD: QWRtaW4xMjM=

postgres:
  secrets:
    DB_DATABASE: b3JpZ2luaHVi
    DB_USERNAME: b3JpZ2luaHVi
    DB_PASSWORD: b3JpZ2luaHVi

ingress:
  tls:
    enabled: false
