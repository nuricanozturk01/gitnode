version: "2"

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    gofmt:
      simplify: true
      rewrite-rules:
        - pattern: "interface{}"
          replacement: "any"

    goimports:
      local-prefixes:
        - github.com/nuricanozturk/gitnode-runner

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck    # includes gosimple, stylecheck, simple
    - unused
    - bodyclose
    - copyloopvar
    - durationcheck
    - errorlint
    - gocritic
    - misspell
    - noctx
    - revive
    - unconvert
    - unparam
    - gosec

  settings:
    govet:
      enable:
        - shadow

    revive:
      rules:
        - name: var-naming
          severity: warning
        # exported comment rule is too noisy for internal packages
        - name: exported
          disabled: true

    gosec:
      excludes:
        - G204  # subprocess with variable — expected in executor
        - G304  # file via variable in config Load — user-provided path, expected
        - G306  # file permissions in workspace manager
