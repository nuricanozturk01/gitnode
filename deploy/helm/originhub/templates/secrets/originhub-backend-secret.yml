{{- if or .Values.originhub.secrets.OAUTH2_GOOGLE_CLIENT_ID .Values.originhub.secrets.OAUTH2_GOOGLE_CLIENT_SECRET .Values.originhub.secrets.OAUTH2_GITHUB_CLIENT_ID .Values.originhub.secrets.OAUTH2_GITHUB_CLIENT_SECRET .Values.originhub.secrets.OAUTH2_GITLAB_CLIENT_ID .Values.originhub.secrets.OAUTH2_GITLAB_CLIENT_SECRET .Values.originhub.secrets.ORIGINHUB_BOOTSTRAP_ADMIN_PASSWORD }}
apiVersion: v1
kind: Secret
metadata:
  name: originhub-backend-secret
  namespace: {{ include "originhub.namespace" . }}
  labels:
    app: originhub-backend
type: Opaque
data:
{{- if .Values.originhub.secrets.OAUTH2_GOOGLE_CLIENT_ID }}
  OAUTH2_GOOGLE_CLIENT_ID: {{ .Values.originhub.secrets.OAUTH2_GOOGLE_CLIENT_ID }}
{{- end }}
{{- if .Values.originhub.secrets.OAUTH2_GOOGLE_CLIENT_SECRET }}
  OAUTH2_GOOGLE_CLIENT_SECRET: {{ .Values.originhub.secrets.OAUTH2_GOOGLE_CLIENT_SECRET }}
{{- end }}
{{- if .Values.originhub.secrets.OAUTH2_GITHUB_CLIENT_ID }}
  OAUTH2_GITHUB_CLIENT_ID: {{ .Values.originhub.secrets.OAUTH2_GITHUB_CLIENT_ID }}
{{- end }}
{{- if .Values.originhub.secrets.OAUTH2_GITHUB_CLIENT_SECRET }}
  OAUTH2_GITHUB_CLIENT_SECRET: {{ .Values.originhub.secrets.OAUTH2_GITHUB_CLIENT_SECRET }}
{{- end }}
{{- if .Values.originhub.secrets.OAUTH2_GITLAB_CLIENT_ID }}
  OAUTH2_GITLAB_CLIENT_ID: {{ .Values.originhub.secrets.OAUTH2_GITLAB_CLIENT_ID }}
{{- end }}
{{- if .Values.originhub.secrets.OAUTH2_GITLAB_CLIENT_SECRET }}
  OAUTH2_GITLAB_CLIENT_SECRET: {{ .Values.originhub.secrets.OAUTH2_GITLAB_CLIENT_SECRET }}
{{- end }}
{{- if .Values.originhub.secrets.ORIGINHUB_BOOTSTRAP_ADMIN_PASSWORD }}
  ORIGINHUB_BOOTSTRAP_ADMIN_PASSWORD: {{ .Values.originhub.secrets.ORIGINHUB_BOOTSTRAP_ADMIN_PASSWORD }}
{{- end }}
{{- end }}
