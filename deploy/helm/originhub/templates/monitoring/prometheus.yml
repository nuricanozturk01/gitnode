{{- if and .Values.monitoring.enabled .Values.monitoring.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: originhub-prometheus
  namespace: {{ include "originhub.namespace" . }}
  labels:
    app: originhub-prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: originhub-kubernetes
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - originhub-backend.{{ include "originhub.namespace" . }}.svc.cluster.local:80
---
apiVersion: v1
kind: Service
metadata:
  name: originhub-prometheus
  namespace: {{ include "originhub.namespace" . }}
  labels:
    app: originhub-prometheus
spec:
  type: ClusterIP
  selector:
    app: originhub-prometheus
  ports:
    - port: 9090
      name: http
      targetPort: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: originhub-prometheus
  namespace: {{ include "originhub.namespace" . }}
  labels:
    app: originhub-prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: originhub-prometheus
  template:
    metadata:
      labels:
        app: originhub-prometheus
    spec:
      containers:
        - name: prometheus
          image: {{ .Values.monitoring.prometheus.image }}
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.retention.time={{ .Values.monitoring.prometheus.retention }}
          ports:
            - containerPort: 9090
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: originhub-prometheus
{{- end }}
