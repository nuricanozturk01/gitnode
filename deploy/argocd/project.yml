apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: originhub
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: OriginHub backend stack
  sourceRepos:
    - "*"
  destinations:
    - namespace: originhub
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
