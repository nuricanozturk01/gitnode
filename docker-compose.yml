services:
  postgres:
    container_name: gitnode-postgres
    hostname: gitnode-postgres
    build:
      context: ./postgres
      dockerfile: Dockerfile
    environment:
      POSTGRES_DB: gitnode
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    command: >
      postgres
      -c shared_preload_libraries=pgaudit
      -c pgaudit.log=write,ddl,role
      -c log_destination=stderr
      -c logging_collector=on
      -c log_directory=/var/log/postgresql
      -c log_filename=postgresql-%Y-%m-%d.log
      -c log_rotation_age=1d
      -c log_truncate_on_rotation=on
      -c log_min_duration_statement=500
    volumes:
      - postgres-logs:/var/log/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U admin -d gitnode']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - gitnode

  redis:
    container_name: gitnode-redis
    image: redis:7-alpine
    command: redis-server --save "" --maxmemory 512mb --maxmemory-policy volatile-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - gitnode

  prometheus:
    container_name: gitnode-prometheus
    image: prom/prometheus:v3.4.0
    profiles:
      - monitoring
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - gitnode
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"

  grafana:
    container_name: gitnode-grafana
    image: grafana/grafana:12.0.1
    profiles:
      - monitoring
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    networks:
      - gitnode
    depends_on:
      prometheus:
        condition: service_started

  # ── CI/CD Runner (optional) ──────────────────────────────────────────────────
  # Prerequisites:
  #   1. Build the runner: make runner-build
  #   2. Register it once to generate the config file:
  #        ./gitnode-runner/dist/gitnode-runner start \
  #          --server-url http://localhost:8080 --token <registration-token> \
  #          --name docker-runner --labels self-hosted,linux,docker \
  #          --executor docker --config ~/.gitnode-runner/config.yml
  #   3. Start via Compose: docker compose --profile runner up -d runner
  runner:
    container_name: gitnode-runner
    build:
      context: ./gitnode-runner
      dockerfile: Dockerfile
    profiles:
      - runner
    command: ["./gitnode-runner", "start", "--config", "/root/.gitnode-runner/config.yml"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - runner-work:/tmp/gitnode-runner
      - ~/.gitnode-runner:/root/.gitnode-runner
    networks:
      - gitnode
    restart: unless-stopped

networks:
  gitnode:
    name: gitnode
    driver: bridge

volumes:
  postgres-logs:
    name: gitnode-postgres-logs
  gitnode-repos:
    name: gitnode-repos
  runner-work:
    name: gitnode-runner-work
