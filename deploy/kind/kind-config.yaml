kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
# Default ports 80/443. When busy, bootstrap auto-generates config with 9080/9443
# via deploy/kind/generate-kind-config.sh — do not edit hostPort here for that case.
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      - containerPort: 30222
        hostPort: 30222
        protocol: TCP
