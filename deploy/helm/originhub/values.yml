# Base values — override secrets in prod.yml (base64). Public URLs: domain.* only.
imageTag:

# ─── Single source of truth for URLs ─────────────────────────────────────────
# apiHost     → Ingress host for backend (API, Git HTTP, OAuth callbacks)
# frontendUrl → Vercel / Cloudflare Pages (CORS + post-login redirects)
domain:
  apiHost:
  frontendUrl:
  grafanaHost:
  extraCorsOrigins: []

persistence:
  repos:
    enabled: true
    size: 20Gi
    storageClass: ""
    # ReadWriteOnce = single replica (default). Scale-out: ReadWriteMany (NFS, EFS, Longhorn RWX, …)
    accessMode: ReadWriteOnce
  postgres:
    enabled: true
    size: 10Gi
    storageClass: ""

common:
  secrets:
    ORIGINHUB_JWT_SECRET:

originhub:
  # >1 requires persistence.repos.accessMode: ReadWriteMany — Git data on shared PVC
  replicaCount: 1
  admin:
    enabled: true
  ssh:
    enabled: true
    port: 2222
    serviceType: LoadBalancer
    nodePort: 30222
  image:
    repository: repo.repsy.io/nuricanozturk/originhub/originhub-os
    pullPolicy: Always
  # Heap only — image ENTRYPOINT uses ZGC; do not set -XX:+UseG1GC here (JVM crash)
  javaToolOptions: "-Xms512m -Xmx1536m"
  imagePullSecrets: []
  secrets:
    OAUTH2_GOOGLE_CLIENT_ID:
    OAUTH2_GOOGLE_CLIENT_SECRET:
    OAUTH2_GITHUB_CLIENT_ID:
    OAUTH2_GITHUB_CLIENT_SECRET:
    OAUTH2_GITLAB_CLIENT_ID:
    OAUTH2_GITLAB_CLIENT_SECRET:
    ORIGINHUB_BOOTSTRAP_ADMIN_PASSWORD:

postgres:
  image: postgres:17
  secrets:
    DB_DATABASE:
    DB_USERNAME:
    DB_PASSWORD:

redis:
  image: redis:7-alpine

# Optional UI (local K8s flags: K8S_FRONTEND, K8S_ADMIN_PANEL)
frontend:
  enabled: false
  host: app.originhub.local

adminPanel:
  enabled: false
  host: admin.originhub.local
  image:
    repository: originhub-admin-panel
    tag: local
    pullPolicy: IfNotPresent

monitoring:
  enabled: true
  prometheus:
    enabled: true
    image: prom/prometheus:v3.4.0
    retention: 7d
    ingress:
      enabled: false
      host: prometheus.originhub.local
  grafana:
    enabled: true
    image: grafana/grafana:12.0.1
    adminUser: admin
    adminPassword: admin
    ingress:
      enabled: true
  secrets:
    GF_SECURITY_ADMIN_PASSWORD:

ingress:
  className: nginx
  tls:
    enabled: true
    secretName: originhub-backend-tls-cert
  certManager:
    clusterIssuer: selfsigned-issuer
  annotations: {}
