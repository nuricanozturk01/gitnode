name: Deploy | OriginHub

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g. 1.0.0)'
        required: true
      target:
        description: 'Build target'
        required: true
        default: 'default'
        type: choice
        options:
          - both
          - default
          - vps
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Repsy
        uses: docker/login-action@v3
        with:
          registry: repo.repsy.io
          username: ${{ secrets.REPSY_USERNAME }}
          password: ${{ secrets.REPSY_TOKEN }}

      - name: Build and push Default Docker image
        if: ${{ inputs.target == 'default' || inputs.target == 'both' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            repo.repsy.io/nuricanozturk/originhub/originhub-os:${{ inputs.version }}
            repo.repsy.io/nuricanozturk/originhub/originhub-os:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push VPS image
        if: ${{ inputs.target == 'vps' || inputs.target == 'both' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            repo.repsy.io/nuricanozturk/originhub/originhub-os:${{ inputs.version }}-vps
            repo.repsy.io/nuricanozturk/originhub/originhub-os:vps-latest
          build-args: |
            API_URL=https://originhub.nuricanozturk.com
            GIT_SSH_URL=git@originhub.nuricanozturk.com
          cache-from: type=gha
          cache-to: type=gha,mode=max
