global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: originhub
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8080
    # When running inside Docker compose alongside the app container, replace
    # host.docker.internal with the app service name, e.g.:
    # - targets: ['originhub-app:8080']
