{{- if and .Values.adminPanel.enabled .Values.adminPanel.host }}
apiVersion: v1
kind: Service
metadata:
  name: originhub-admin-panel
  namespace: {{ include "originhub.namespace" . }}
  labels:
    app: originhub-admin-panel
spec:
  type: ClusterIP
  selector:
    app: originhub-admin-panel
  ports:
    - port: 80
      name: http
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: originhub-admin-panel
  namespace: {{ include "originhub.namespace" . }}
  labels:
    app: originhub-admin-panel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: originhub-admin-panel
  template:
    metadata:
      labels:
        app: originhub-admin-panel
    spec:
      containers:
        - name: admin-panel
          image: {{ .Values.adminPanel.image.repository }}:{{ .Values.adminPanel.image.tag }}
          imagePullPolicy: {{ .Values.adminPanel.image.pullPolicy }}
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: originhub-admin-panel
  namespace: {{ include "originhub.namespace" . }}
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    {{- if .Values.ingress.tls.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.certManager.clusterIssuer | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  rules:
    - host: {{ .Values.adminPanel.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: originhub-admin-panel
                port:
                  number: 80
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.adminPanel.host | quote }}
      secretName: originhub-admin-panel-tls-cert
  {{- end }}
{{- end }}
