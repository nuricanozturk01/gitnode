name: MR Checks | OriginHub

on:
  workflow_dispatch:
    inputs:
      skip_backend:
        description: Skip backend checks
        type: boolean
        default: false
      skip_frontend:
        description: Skip frontend checks
        type: boolean
        default: false
      maven_args:
        description: Extra Maven arguments
        type: string
        default: ""
  pull_request:
    branches:
      - main

jobs:
  pre-checks:
    name: Editorconfig check - All
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v1

      - name: Install editorconfig-checker
        run: npm install -g editorconfig-checker

      - name: Run editorconfig-checker
        run: editorconfig-checker -exclude 'Makefile'

  originhub-backend-checks:
    name: OriginHub Backend Checks
    runs-on: [self-hosted, linux]
    needs: pre-checks
    if: ${{ inputs.skip_backend != 'true' }}
    steps:
      - uses: actions/checkout@v1

      - uses: actions/setup-java@v1
        with:
          java-version: "25"
          distribution: temurin
          cache: maven

      - name: Build and Verify
        run: mvn -B -ntp verify ${{ inputs.maven_args }}

  originhub-frontend-checks:
    name: OriginHub Checks (${{ matrix.project }})
    runs-on: [self-hosted, linux]
    needs: pre-checks
    if: ${{ inputs.skip_frontend != 'true' }}
    strategy:
      matrix:
        project:
          - originhub-frontend
          - e2e
          - originhub-admin-panel
    steps:
      - uses: actions/checkout@v1

      - uses: actions/setup-node@v1
        with:
          node-version: "24"

      - uses: pnpm/action-setup@v1
        with:
          version: 10

      - name: Install dependencies
        run: cd ${{ matrix.project }} && pnpm install --ignore-scripts

      - name: Lint
        run: cd ${{ matrix.project }} && pnpm run lint
