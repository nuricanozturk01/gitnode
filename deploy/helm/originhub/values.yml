# Local kind cluster defaults — edit domain.* and secrets for your environment.
# Use *.originhub.test (not .local — macOS mDNS breaks .local in browsers).
imageTag: local

domain:
  apiHost: api.originhub.test
  frontendUrl: http://app.originhub.test
  grafanaHost: grafana.originhub.test
  extraCorsOrigins:
    - http://admin.originhub.test
    - http://localhost:4200

persistence:
  repos:
    enabled: true
    size: 5Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  postgres:
    enabled: true
    size: 5Gi
    storageClass: ""

common:
  secrets:
    # Base64(JWT signing key) — JwtUtils decodes ORIGINHUB_JWT_SECRET again at runtime
    ORIGINHUB_JWT_SECRET: Ykc5allXd3RaR1YyTFdwM2RDMXpaV055WlhRdGEyVjVMVE15WW5sMFpYTWhJUT09

originhub:
  replicaCount: 1
  admin:
    enabled: true
  ssh:
    enabled: true
    port: 2222
    serviceType: NodePort
    nodePort: 30222
  image:
    repository: originhub-backend
    pullPolicy: IfNotPresent
  javaToolOptions: "-Xms512m -Xmx1536m"
  imagePullSecrets: []
  secrets:
    OAUTH2_GOOGLE_CLIENT_ID:
    OAUTH2_GOOGLE_CLIENT_SECRET:
    OAUTH2_GITHUB_CLIENT_ID:
    OAUTH2_GITHUB_CLIENT_SECRET:
    OAUTH2_GITLAB_CLIENT_ID:
    OAUTH2_GITLAB_CLIENT_SECRET:
    # Admin123 — platform admin for http://admin.originhub.test (username: admin)
    ORIGINHUB_BOOTSTRAP_ADMIN_PASSWORD: QWRtaW4xMjM=
    # Local dev Actions secrets vault — openssl rand -base64 32 (see: make actions-encryption-key)
    ACTIONS_ENCRYPTION_KEY: czdDMzkrdGxxNnZnM2NXN0JpU1NNeHpic2R3cCs5WVFxTW9MaWdsZTM0ND0=

postgres:
  image: postgres:17
  secrets:
    DB_DATABASE: b3JpZ2luaHVi
    DB_USERNAME: b3JpZ2luaHVi
    DB_PASSWORD: b3JpZ2luaHVi

redis:
  image: redis:7-alpine

frontend:
  enabled: true
  host: app.originhub.test
  image:
    repository: originhub-frontend
    tag: local
    pullPolicy: IfNotPresent

adminPanel:
  enabled: true
  host: admin.originhub.test
  image:
    repository: originhub-admin-panel
    tag: local
    pullPolicy: IfNotPresent

monitoring:
  enabled: true
  prometheus:
    enabled: true
    image: prom/prometheus:v3.4.0
    retention: 7d
    ingress:
      enabled: false
      host: prometheus.originhub.test
  grafana:
    enabled: true
    image: grafana/grafana:12.0.1
    adminUser: admin
    adminPassword: admin
    ingress:
      enabled: true
  secrets:
    GF_SECURITY_ADMIN_PASSWORD:

ingress:
  className: nginx
  tls:
    enabled: false
    secretName: originhub-backend-tls-cert
  certManager:
    clusterIssuer: selfsigned-issuer
  annotations: {}
