global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # App running in Docker (make app) on the originhub network
  - job_name: originhub-docker
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - originhub:8080

  # App running on the host (./mvnw spring-boot:run)
  - job_name: originhub-host
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8080
