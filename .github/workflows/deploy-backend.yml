name: Deploy | GitNode Backend (no SPA)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g. 1.0.0)'
        required: true
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Repsy
        uses: docker/login-action@v3
        with:
          registry: repo.repsy.io
          username: ${{ secrets.REPSY_USERNAME }}
          password: ${{ secrets.REPSY_TOKEN_VPS }}

      - name: Build and push Backend (no SPA)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: gitnode-backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            repo.repsy.io/nuricanozturk/gitnode-vps/gitnode:${{ inputs.version }}
            repo.repsy.io/nuricanozturk/gitnode-vps/gitnode:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
