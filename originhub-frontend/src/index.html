<!doctype html>
<html lang="en" data-theme="originhub">
  <head>
    <meta charset="utf-8" />
    <script>
      (function () {
        var k = 'originhub-theme';
        var allowed = { originhub: 1, 'originhub-light': 1 };
        try {
          var t = localStorage.getItem(k);
          if (t && allowed[t]) {
            document.documentElement.setAttribute('data-theme', t);
            document.documentElement.style.colorScheme = t === 'originhub-light' ? 'light' : 'dark';
          }
        } catch (e) {}
      })();
    </script>
    <title>OriginHub — Self-hosted Git</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
