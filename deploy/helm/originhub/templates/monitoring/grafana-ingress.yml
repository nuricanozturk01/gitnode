{{- if and .Values.monitoring.enabled .Values.monitoring.grafana.ingress.enabled .Values.domain.grafanaHost }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: originhub-grafana
  namespace: {{ include "originhub.namespace" . }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    {{- if .Values.ingress.tls.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.certManager.clusterIssuer | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  rules:
    - host: {{ .Values.domain.grafanaHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: originhub-grafana
                port:
                  number: 3000
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.domain.grafanaHost | quote }}
      secretName: originhub-grafana-tls-cert
  {{- end }}
{{- end }}
