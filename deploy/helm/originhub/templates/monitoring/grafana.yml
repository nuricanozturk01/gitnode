{{- if .Values.monitoring.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: originhub-grafana-datasources
  namespace: {{ include "originhub.namespace" . }}
  labels:
    app: originhub-grafana
data:
  prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://originhub-prometheus.{{ include "originhub.namespace" . }}.svc.cluster.local:9090
        isDefault: true
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: originhub-grafana-dashboards
  namespace: {{ include "originhub.namespace" . }}
  labels:
    app: originhub-grafana
data:
  dashboard.yml: |
{{ .Files.Get "config/grafana/dashboards/dashboard.yml" | indent 4 }}
  originhub.json: |
{{ .Files.Get "config/grafana/dashboards/originhub.json" | indent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: originhub-grafana
  namespace: {{ include "originhub.namespace" . }}
  labels:
    app: originhub-grafana
spec:
  type: ClusterIP
  selector:
    app: originhub-grafana
  ports:
    - port: 3000
      name: http
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: originhub-grafana
  namespace: {{ include "originhub.namespace" . }}
  labels:
    app: originhub-grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: originhub-grafana
  template:
    metadata:
      labels:
        app: originhub-grafana
    spec:
      containers:
        - name: grafana
          image: {{ .Values.monitoring.grafana.image }}
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_SECURITY_ADMIN_USER
              value: {{ .Values.monitoring.grafana.adminUser | quote }}
            {{- if .Values.monitoring.secrets.GF_SECURITY_ADMIN_PASSWORD }}
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: originhub-monitoring-secret
                  key: GF_SECURITY_ADMIN_PASSWORD
            {{- else }}
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: {{ .Values.monitoring.grafana.adminPassword | quote }}
            {{- end }}
            - name: GF_SERVER_ROOT_URL
              value: {{ if .Values.domain.grafanaHost }}{{ printf "%s://%s/" (include "originhub.scheme" .) .Values.domain.grafanaHost | quote }}{{ else }}""{{ end }}
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards
              mountPath: /etc/grafana/provisioning/dashboards
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: datasources
          configMap:
            name: originhub-grafana-datasources
        - name: dashboards
          configMap:
            name: originhub-grafana-dashboards
{{- end }}
