services:
  postgres:
    container_name: originhub-postgres
    hostname: originhub-postgres
    build:
      context: ./postgres
      dockerfile: Dockerfile
    environment:
      POSTGRES_DB: originhub
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    command: >
      postgres
      -c shared_preload_libraries=pgaudit
      -c pgaudit.log=write,ddl,role
      -c log_destination=stderr
      -c logging_collector=on
      -c log_directory=/var/log/postgresql
      -c log_filename=postgresql-%Y-%m-%d.log
      -c log_rotation_age=1d
      -c log_truncate_on_rotation=on
      -c log_min_duration_statement=500
    volumes:
      - postgres-logs:/var/log/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U admin -d originhub']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - originhub

  redis:
    container_name: originhub-redis
    image: redis:7-alpine
    command: redis-server --save "" --maxmemory 512mb --maxmemory-policy volatile-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - originhub

  prometheus:
    container_name: originhub-prometheus
    image: prom/prometheus:v3.4.0
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - originhub
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"

  grafana:
    container_name: originhub-grafana
    image: grafana/grafana:12.0.1
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    networks:
      - originhub
    depends_on:
      prometheus:
        condition: service_started

networks:
  originhub:
    name: originhub
    driver: bridge

volumes:
  postgres-logs:
    name: originhub-postgres-logs
  originhub-repos:
    name: originhub-repos
