apiVersion: v1
kind: Service
metadata:
  name: originhub-postgres
  namespace: {{ include "originhub.namespace" . }}
  labels:
    app: originhub-postgres
spec:
  type: ClusterIP
  selector:
    app: originhub-postgres
  ports:
    - port: 5432
      name: postgres
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: originhub-postgres
  namespace: {{ include "originhub.namespace" . }}
  labels:
    app: originhub-postgres
spec:
  serviceName: originhub-postgres
  replicas: 1
  selector:
    matchLabels:
      app: originhub-postgres
  template:
    metadata:
      labels:
        app: originhub-postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DB_DATABASE
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DB_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DB_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER"
            initialDelaySeconds: 5
            periodSeconds: 5
  {{- if .Values.persistence.postgres.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.persistence.postgres.storageClass }}
        storageClassName: {{ .Values.persistence.postgres.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.postgres.size }}
  {{- end }}
