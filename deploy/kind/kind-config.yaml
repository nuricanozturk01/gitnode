kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
# Reference config — bootstrap uses deploy/kind/generate-kind-config.sh (default host ports 80/443).
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      - containerPort: 30222
        hostPort: 30222
        protocol: TCP
