@if (enriched().length > 0) {
  <div>
    <div class="mb-2 flex h-2 w-full overflow-hidden rounded-full">
      @for (lang of enriched(); track lang.language) {
        <div
          class="h-full transition-all"
          [style.width.%]="lang.percentage"
          [style.background-color]="lang.color"
          [title]="lang.displayName + ' ' + lang.percentage.toFixed(1) + '%'"
        ></div>
      }
    </div>
    <div class="flex flex-wrap gap-x-4 gap-y-1">
      @for (lang of enriched(); track lang.language) {
        <span class="flex items-center gap-1.5 text-xs">
          <span class="inline-block size-2.5 rounded-full" [style.background-color]="lang.color"></span>
          <span class="text-base-content font-medium">{{ lang.displayName }}</span>
          <span class="text-base-content/55">{{ lang.percentage.toFixed(1) }}%</span>
        </span>
      }
    </div>
  </div>
}
