services:
  postgres:
    container_name: originhub-postgres
    hostname: originhub-postgres
    image: postgres:17
    environment:
      POSTGRES_DB: originhub
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    networks:
      - originhub

  redis:
    container_name: originhub-redis
    image: redis:7-alpine
    command: redis-server --save ""
    ports:
      - "6379:6379"
    networks:
      - originhub

networks:
  originhub:
    name: originhub
    driver: bridge
