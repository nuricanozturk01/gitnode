global
  maxconn 1024
  log stdout format raw local0 info

defaults
  mode tcp
  timeout connect 5s
  timeout client 60s
  timeout server 60s
  log global
  option tcplog

# ── HTTP ─────────────────────────────────────────────────────────────────────
frontend http-in
  bind *:8080
  default_backend app-http

backend app-http
  balance roundrobin
  option tcp-check
  # single-instance (make app)
  server app-single originhub:8080   check fall 2 rise 1 inter 5s
  # scaled instances (make app-scale N=...)
  server app-1      originhub-1:8080 check fall 2 rise 1 inter 5s
  server app-2      originhub-2:8080 check fall 2 rise 1 inter 5s
  server app-3      originhub-3:8080 check fall 2 rise 1 inter 5s
  server app-4      originhub-4:8080 check fall 2 rise 1 inter 5s

# ── SSH (Git over SSH) ────────────────────────────────────────────────────────
frontend ssh-in
  bind *:22
  default_backend app-ssh

backend app-ssh
  balance leastconn
  option tcp-check
  timeout connect 10s
  timeout client 3600s
  timeout server 3600s
  # single-instance (make app)
  server app-single originhub:2222   check fall 2 rise 1 inter 10s
  # scaled instances (make app-scale N=...)
  server app-1      originhub-1:2222 check fall 2 rise 1 inter 10s
  server app-2      originhub-2:2222 check fall 2 rise 1 inter 10s
  server app-3      originhub-3:2222 check fall 2 rise 1 inter 10s
  server app-4      originhub-4:2222 check fall 2 rise 1 inter 10s
